<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookbook AI Agent Dashboard</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            500: '#ea580c', // Orange accent
                            600: '#ea580c',
                            700: '#c2410c',
                        },
                        darkbg: '#0f172a', // Slate 900
                        darkcard: '#1e293b', // Slate 800
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ea580c;
        }
        /* Custom markdown rendering inside chat bubble */
        .markdown-content p {
            margin-bottom: 0.5rem;
        }
        .markdown-content p:last-child {
            margin-bottom: 0;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.25rem;
            margin-bottom: 0.5rem;
            list-style-type: disc;
        }
        .markdown-content ol {
            list-style-type: decimal;
        }
        .markdown-content li {
            margin-bottom: 0.25rem;
        }
        .markdown-content strong {
            color: #f8fafc;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-darkbg text-slate-100 font-sans min-h-screen flex flex-col antialiased">

    <!-- Header Section -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-amber-500 flex items-center justify-center shadow-lg shadow-brand-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-white">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
                </svg>
            </div>
            <div>
                <h1 class="font-display font-bold text-lg tracking-wide bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Cookbook Manager</h1>
                <p class="text-xs text-slate-400 flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    GCP Agent Active
                </p>
            </div>
        </div>

        <div class="flex gap-2">
            <button id="tutorialBtn" class="flex items-center gap-1.5 px-3.5 py-2 rounded-lg border border-slate-700 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold tracking-wide transition-all active:scale-95 shadow-sm">
                💡 Tutorial
            </button>
            <button id="resetBtn" class="flex items-center gap-1.5 px-3.5 py-2 rounded-lg border border-slate-700 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold tracking-wide transition-all active:scale-95 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
                Reset Session
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 flex flex-col overflow-hidden max-h-[calc(100vh-80px)]">
        
        <!-- Dashboard Content container -->
        <div class="flex-1 bg-darkcard/40 backdrop-blur-sm border border-slate-800 rounded-2xl flex flex-col overflow-hidden shadow-xl min-h-0">
            
            <!-- Chat View Panel -->
            <div id="chatView" class="flex-1 flex flex-col overflow-hidden min-h-0">
                <!-- Welcome Info banner -->
                <div class="px-6 py-4 bg-slate-800/30 border-b border-slate-800 text-slate-400 text-xs flex justify-between items-center flex-wrap gap-2">
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-0.5 rounded bg-brand-500/10 text-brand-500 font-semibold border border-brand-500/20">Skill Support</span>
                        <span>Interactive step-by-step &amp; bulk recipe saving with dynamic correction</span>
                    </div>
                    <div class="font-mono text-[10px] text-slate-500" id="sessionIdDisplay">Session: Loading...</div>
                </div>

                <!-- Messages area -->
                <div id="chatArea" class="flex-1 overflow-y-auto p-6 space-y-4">
                    <!-- Welcome Message -->
                    <div class="flex items-start gap-3 max-w-[85%]">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-brand-600 to-amber-500 flex-shrink-0 flex items-center justify-center shadow-md">
                            <span class="text-white text-xs font-bold">AI</span>
                        </div>
                        <div class="bg-slate-800 border border-slate-700/50 rounded-2xl rounded-tl-none px-4 py-3 shadow-md">
                            <p class="text-slate-200 text-sm">Hello! I am your Cookbook AI Assistant. Ask me to recommend a recipe, or start saving one (either step-by-step or in bulk).</p>
                            <div class="mt-2.5 flex flex-wrap gap-2">
                                <button onclick="sendQuickMessage('I want to save a recipe')" class="px-3 py-1.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 border border-slate-600/30 text-xs text-brand-500 font-semibold transition-all">
                                    🍳 Save a Recipe
                                </button>
                                <button onclick="sendQuickMessage('What can you recommend to cook for dinner?')" class="px-3 py-1.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 border border-slate-600/30 text-xs text-amber-500 font-semibold transition-all">
                                    🍕 Recommend Dinner
                                </button>
                                <button onclick="sendQuickMessage('Recommend recipes from banana')" class="px-3 py-1.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 border border-slate-600/30 text-xs text-yellow-500 font-semibold transition-all">
                                    🍌 Banana Recipes
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Interactive Action Buttons -->
                <div id="interactiveButtons" class="hidden px-6 py-3.5 bg-slate-900/40 border-t border-slate-800/60 flex flex-wrap gap-2"></div>

                <!-- Typing indicator -->
                <div id="typingIndicator" class="hidden px-6 py-3 bg-slate-900/30 border-t border-slate-800/40 flex items-center gap-2.5">
                    <div class="flex space-x-1">
                        <div class="w-1.5 h-1.5 bg-brand-500 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                        <div class="w-1.5 h-1.5 bg-brand-500 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                        <div class="w-1.5 h-1.5 bg-brand-500 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                    </div>
                    <span class="text-xs text-slate-400 font-medium italic">Agent is typing...</span>
                </div>

                <!-- Input area -->
                <div class="p-4 bg-slate-900/60 border-t border-slate-800 flex gap-2">
                    <input type="text" id="userInput" placeholder="Ask about recipes, or type your response..." autocomplete="off" class="flex-1 px-4 py-3.5 bg-slate-800 border border-slate-700 hover:border-slate-600 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 focus:outline-none rounded-xl text-white placeholder-slate-400 text-sm transition-all">
                    <button id="sendBtn" class="px-5 py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold text-sm transition-all active:scale-95 flex items-center gap-1.5 shadow-lg shadow-brand-500/10">
                        Send
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                        </svg>
                    </button>
                </div>
            </div>

        </div>

    </main>

    <!-- JavaScript logic -->
    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const resetBtn = document.getElementById('resetBtn');
        const tutorialBtn = document.getElementById('tutorialBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const sessionIdDisplay = document.getElementById('sessionIdDisplay');
        const interactiveButtons = document.getElementById('interactiveButtons');

        // Session ID management
        let sessionId = localStorage.getItem('cookbook_session_id');
        if (!sessionId) {
            sessionId = 'session_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('cookbook_session_id', sessionId);
        }
        sessionIdDisplay.textContent = `Session: ${sessionId}`;

        // Configure marked options
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        function appendMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? 'flex justify-end' : 'flex items-start gap-3 max-w-[85%]';
            
            if (isUser) {
                wrapper.innerHTML = `
                    <div class="bg-brand-600 text-white rounded-2xl rounded-tr-none px-4 py-3 max-w-[85%] shadow-md text-sm">
                        ${escapeHtml(text)}
                    </div>
                `;
            } else {
                // Parse markdown content
                const htmlContent = marked.parse(text);
                wrapper.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-brand-600 to-amber-500 flex-shrink-0 flex items-center justify-center shadow-md">
                        <span class="text-white text-xs font-bold">AI</span>
                    </div>
                    <div class="bg-slate-800 border border-slate-700/50 rounded-2xl rounded-tl-none px-4 py-3 shadow-md text-sm markdown-content text-slate-200">
                        ${htmlContent}
                    </div>
                `;
            }
            
            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function updateInteractiveButtons(interruptId) {
            interactiveButtons.innerHTML = '';
            
            if (!interruptId) {
                interactiveButtons.classList.add('hidden');
                return;
            }

            let buttons = [];

            if (interruptId.startsWith('mode_')) {
                buttons = [
                    { text: '🍳 Step-by-Step', value: 'step-by-step', color: 'bg-brand-600 hover:bg-brand-500' },
                    { text: '📝 Whole Recipe in One Message', value: 'Whole recipe in one message', color: 'bg-amber-600 hover:bg-amber-500' }
                ];
            } else if (interruptId.startsWith('confirm_')) {
                buttons = [
                    { text: '✅ Yes', value: 'yes', color: 'bg-emerald-600 hover:bg-emerald-500' },
                    { text: '❌ No / Cancel', value: 'cancel', color: 'bg-rose-600 hover:bg-rose-500' }
                ];
            } else if (interruptId.startsWith('retry_')) {
                buttons = [
                    { text: '🔄 Yes (Retry Search)', value: 'yes', color: 'bg-emerald-600 hover:bg-emerald-500' },
                    { text: '🛑 No', value: 'no', color: 'bg-rose-600 hover:bg-rose-500' }
                ];
            }

            if (buttons.length > 0) {
                buttons.forEach(btn => {
                    const buttonEl = document.createElement('button');
                    buttonEl.className = `px-4 py-2.5 rounded-xl text-white text-xs font-semibold shadow-md transition-all active:scale-95 ${btn.color}`;
                    buttonEl.textContent = btn.text;
                    buttonEl.addEventListener('click', () => {
                        userInput.value = btn.value;
                        handleSend();
                    });
                    interactiveButtons.appendChild(buttonEl);
                });
                interactiveButtons.classList.remove('hidden');
            } else {
                interactiveButtons.classList.add('hidden');
            }
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            appendMessage(message, true);
            
            // Hide buttons during processing
            interactiveButtons.classList.add('hidden');

            // Show typing indicator
            typingIndicator.classList.remove('hidden');
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    if (response.status === 429) {
                        throw new Error("RATE_LIMIT_EXCEEDED");
                    }
                    throw new Error(`Server returned status ${response.status}`);
                }

                const data = await response.json();
                typingIndicator.classList.add('hidden');
                
                if (data.error) {
                    appendMessage(`⚠️ Error: ${data.error}`);
                    updateInteractiveButtons(null);
                } else {
                    appendMessage(data.response);
                    updateInteractiveButtons(data.current_interrupt_id);
                }
            } catch (err) {
                console.error(err);
                typingIndicator.classList.add('hidden');
                updateInteractiveButtons(null);
                if (err.message === "RATE_LIMIT_EXCEEDED") {
                    appendMessage(`⚠️ **Rate Limit Exceeded**: You have made too many requests. There is a limit of 5 requests per minute per IP address. Please wait a minute and try again.`);
                } else {
                    appendMessage(`⚠️ Connection failed. Please check your credentials or network and try again.`);
                }
            }
        }

        function sendQuickMessage(text) {
            userInput.value = text;
            handleSend();
        }

        // Event listeners
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleSend();
            }
        });

        tutorialBtn.addEventListener('click', () => {
            appendMessage("💡 **Tutorial & Constraints**\n\nI can save a recipe step-by-step, or you can paste your recipe in bulk and I will divide it into title, ingredients, steps, and category. I can recommend a recipe if you ask me to find something that can be cooked with a particular ingredient, or if you provide a type of meal like waffles, Japanese cuisine, breakfast, etc. \n\n**Please note the following constraints:**\n- There is a rate limit of **5 requests per minute** from the same IP address.\n- Inputs must be **simple text** (no programming code, XML/HTML, base64 files, or absolute file paths).\n- Text lengths are limited to: **100 characters** for Title/Categories, **200 characters** for Ingredients, and **1000 characters** for Steps.\n- Only **50 new recipes** can be added to the cookbook in any 24-hour period.", false);
        });

        resetBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to reset the conversation session? This will clear history.')) {
                localStorage.removeItem('cookbook_session_id');
                window.location.reload();
            }
        });
    </script>
</body>
</html>
